<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#0a0e14" />
  <title>TerminalX</title>
  <link rel="stylesheet" href="./css/theme.css" />
  <link rel="stylesheet" href="./css/terminal.css" />
  <link rel="stylesheet" href="./css/prism-terminal.css" />
  <script type="module" src="./js/app.js"></script>
</head>
<body>
  <div id="terminal">
    <div id="titlebar">
      <div class="dots">
        <span class="dot red"></span>
        <span class="dot yellow"></span>
        <span class="dot green"></span>
      </div>
      <span id="title">TerminalX</span>
      <span id="titlebar-path"></span>
      <span id="theme-toggle" class="theme-toggle" title="Toggle theme">◐</span>
    </div>
    <div id="output"></div>
    <div id="command-bar" class="button-bar hidden"></div>
    <div id="argument-picker" class="button-bar hidden"></div>
    <div id="open-overlay" class="hidden">
      <div class="open-backdrop"></div>
      <div class="open-window">
        <div class="open-titlebar">
          <div class="dots">
            <span class="dot red open-close-btn"></span>
            <span class="dot yellow open-minimize-btn"></span>
            <span class="dot green open-maximize-btn"></span>
          </div>
          <span class="open-title-path"></span>
          <button class="open-close-icon" aria-label="Close">&times;</button>
        </div>
        <div class="open-body"></div>
      </div>
    </div>
    <div id="input-line">
      <span id="prompt"></span>
      <input type="text" id="cmd-input" autocomplete="off" spellcheck="false" />
    </div>
  </div>
</body>
</html>
