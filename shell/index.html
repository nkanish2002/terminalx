<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#0a0e14" />
  <title>TerminalFS</title>
  <link rel="stylesheet" href="./css/theme.css" />
  <link rel="stylesheet" href="./css/terminal.css" />
  <link rel="stylesheet" href="./css/prism-terminal.css" />
  <script type="module" src="./js/app.js"></script>
</head>
<body>
  <div id="terminal">
    <div id="titlebar">
      <span id="title">TerminalFS</span>
      <span id="titlebar-path"></span>
      <span id="theme-toggle" class="theme-toggle" title="Toggle theme">◐</span>
    </div>
    <div id="output"></div>
    <div id="input-line">
      <span id="prompt"></span>
      <input type="text" id="cmd-input" autocomplete="off" spellcheck="false" autofocus />
    </div>
  </div>
</body>
</html>
